        .detail-container {

            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 900px;

        }

        .detail-left {
            flex: 1; /* Chiếm 1 phần không gian */
        }
        .detail-left img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #eee;
            object-fit: contain;
        }

        /* CỘT PHẢI (CHỨA THÔNG TIN) */
        .detail-right {
            flex: 1.5; /* Chiếm 1.5 phần (to hơn cột trái một chút) */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .detail-right .price { color: #e74c3c; font-size: 24px; font-weight: bold; margin-bottom: 20px;}
        
        /* Hộp xám chứa cấu hình */
        .specs-box {
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
        }
        .specs-box p { margin: 10px 0; font-size: 16px; color: #333; line-height: 1.5;}
    </style>
