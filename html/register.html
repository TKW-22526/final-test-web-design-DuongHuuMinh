<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký | Shop Hữu Minh</title>
    <link href="../css/style.css" rel="stylesheet">
    <style>body { margin: 0; }</style>
</head>
<body>
    <header class="main-header" style="position: static;">
        <div class="header-container" style="justify-content: center;">
            <a href="../index.html" class="logo-wrapper">
                <h1 style="color: white; margin: 0;">Hữu Minh<span style="color: #e74c3c;">.Shop</span></h1>
            </a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>TẠO TÀI KHOẢN MỚI</h2>
            <form onsubmit="return xuLyDangKy(event)">
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" placeholder="Nhập họ và tên..." required>
                </div>
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" placeholder="Nhập số điện thoại..." required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email..." required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Tạo mật khẩu..." required minlength="6">
                </div>
                <div class="form-group">
                    <label for="re-password">Xác nhận mật khẩu</label>
                    <input type="password" id="re-password" placeholder="Nhập lại mật khẩu..." required>
                </div>
                <button type="submit" class="submit-btn">ĐĂNG KÝ TÀI KHOẢN</button>
            </form>
            <div class="auth-links">
                <p>Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a></p>
            </div>
        </div>
    </div>

    <script>
        // Xử lý kiểm tra mật khẩu và giả lập đăng ký
        function xuLyDangKy(event) {
            event.preventDefault();
            const pass = document.getElementById("password").value;
            const rePass = document.getElementById("re-password").value;
            
            // Logic kiểm tra xác nhận mật khẩu
            if(pass !== rePass) {
                alert("⚠️ Mật khẩu xác nhận không khớp! Vui lòng nhập lại.");
                return;
            }
            
            alert("✅ Tạo tài khoản thành công!\nHệ thống sẽ chuyển hướng bạn sang trang Đăng nhập.");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
