<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập | Shop Hữu Minh</title>
    <link href="../css/style.css" rel="stylesheet">
    <style>body { margin: 0; }</style>
</head>
<body>
    <header class="main-header" style="position: static;">
        <div class="header-container" style="justify-content: center;">
            <a href="../index.html" class="logo-wrapper">
                <h1 style="color: white; margin: 0;">Hữu Minh<span style="color: #e74c3c;">.Shop</span></h1>
            </a>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>ĐĂNG NHẬP</h2>
            <form onsubmit="return xuLyDangNhap(event)">
                <div class="form-group">
                    <label for="email">Email hoặc Số điện thoại</label>
                    <input type="text" id="email" placeholder="Nhập email hoặc SĐT..." required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu..." required>
                </div>
                <button type="submit" class="submit-btn">ĐĂNG NHẬP</button>
            </form>
            <div class="auth-links">
                <p>Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></p>
                <p><a href="#" style="color: #7f8c8d; font-weight: normal;">Quên mật khẩu?</a></p>
            </div>
        </div>
    </div>

    <script>
        // Xử lý giả lập hành động đăng nhập
        function xuLyDangNhap(event) {
            event.preventDefault(); 
            const email = document.getElementById('email').value;
            alert(`🎉 Đăng nhập thành công với tài khoản: ${email}\nChào mừng bạn trở lại Shop Hữu Minh!`);
            window.location.href = "../index.html"; 
        }
    </script>
</body>
</html>
